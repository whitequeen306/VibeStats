# VibeStats 配置文件
# VibeCoding Token 消耗统计与趣味看板
#
# 内置工具注册表：程序已预置 20+ 常见 AI 编码工具的日志路径和解析规则
# 你只需在 enabled_tools 中列出要启用的工具 ID 即可
# 如果工具的默认日志路径不对，可以在 custom_paths 中覆盖

# ============================================================
# 启用的工具 ID 列表（从内置注册表中选择）
# 可选值：
#   AI IDE:       cursor, trae, windsurf
#   AI CLI:       claude_code, opencoder, aider, codex_cli, goose, zcode
#   VS Code 扩展: github_copilot, cline, roo_code, continue_dev,
#                 augment, supermaven, cody, tabnine
#   JetBrains:    copilot_jetbrains, codeium_jetbrains
#   其他:         amazon_q, warp_ai
# ============================================================
enabled_tools = [
    "cursor",
    "claude_code",
    "trae",
    "windsurf",
    "github_copilot",
    "cline",
]

# 自定义日志路径覆盖（key=工具ID, value=自定义路径）
# 留空则使用内置默认路径
# 示例：
# [custom_paths]
# cursor = "D:/MyLogs/Cursor/logs"
# claude_code = "/home/user/custom/claude-logs"

# 定时任务执行时间（24小时制），默认凌晨 00:30
schedule_time = "00:30"

# 数据库存储路径（相对于数据目录）
db_path = "vibestats.db"

# HTTP 服务端口
serve_port = 7890

# 美元→人民币汇率（1 USD = ? CNY），可在 /settings 页面修改并触发历史费用重算
exchange_rate = 7.2

# ============================================================
# 模型定价覆盖（可选）：key=模型名(小写)，value=每百万 Token 价格(美元)
# 覆盖内置硬编码定价；改完需 vibestats.exe --rebuild 重新计算已存日期的费用
# 字段：input / output / cache_read（均为 $/MTok）
# key 用模型名小写全名精确匹配（如 glm-5.2），不做模糊匹配
# 示例（均为官方 $/MTok 价）：
# [pricing_overrides]
# "glm-5.2" = { input = 0.6, output = 2.2, cache_read = 0.11 }
# "claude-sonnet-4" = { input = 3.0, output = 15.0, cache_read = 0.30 }
